version: "3.8"

services:
  auth-service:
    build: ./services/auth-service
    restart: always
    ports:
      - "3001:3001"
    environment:
    - AUTH_PORT=3001
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
    - rabbitmq

  product-service:
    build: ./services/product-service
    restart: always
    ports:
      - "3002:3002"
    environment:
    - PRODUCT_PORT=3002
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
    - rabbitmq

  order-service:
    build: ./services/order-service
    restart: always
    ports:
      - "3004:3004"
    environment:
    - RABBITMQ_URL=amqp://rabbitmq
    - ORDER_PORT=3004
    - CART_SERVICE_URL=http://cart-service:3003
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    depends_on:
    - rabbitmq

  cart-service:
    build: ./services/cart-service
    restart: always
    ports:
      - "3003:3003"
    environment:
    - RABBITMQ_URL=amqp://rabbitmq
    - CART_PORT=3003
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    depends_on:
    - rabbitmq
  
  socket-service:
    build: ./services/socket-service
    restart: always
    ports:
      - "3005:3005"
    environment:
    - RABBITMQ_URL=amqp://rabbitmq
    - SOCKET_PORT=3005
    depends_on:
    - rabbitmq

  frontend:
    build: ./apps/frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
    - CART_SERVICE_URL=http://cart-service:3003
    - ORDER_SERVICE_URL=http://order-service:3004
    - PRODUCT_SERVICE_URL=http://product-service:3002
    - AUTH_SERVICE_URL=http://auth-service:3001
    - SOCKET_URL= http://socket-service:3005
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
      - socket-service

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
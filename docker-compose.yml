version: "3.8"

services:
  auth-service:
    build: ./services/auth-service
    restart: always
    ports:
      - "3001:3001"
    environment:
    - AUTH_PORT=3001
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    - RABBITMQ_URL=amqp://rabbitmq
    - FRONTEND_URL=http://13.63.239.214:3000
    depends_on:
      rabbitmq:
        condition: service_healthy

  product-service:
    build: ./services/product-service
    restart: always
    ports:
      - "3002:3002"
    environment:
    - PRODUCT_PORT=3002
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    - RABBITMQ_URL=amqp://rabbitmq
    - FRONTEND_URL=http://13.63.239.214:3000
    depends_on:
      rabbitmq:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    restart: always
    ports:
      - "3004:3004"
    environment:
    - RABBITMQ_URL=amqp://rabbitmq
    - ORDER_PORT=3004
    - CART_SERVICE_URL=http://13.63.239.214:3003
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    - FRONTEND_URL=http://13.63.239.214:3000
    depends_on:
      rabbitmq:
        condition: service_healthy

  cart-service:
    build: ./services/cart-service
    restart: always
    ports:
      - "3003:3003"
    environment:
    - RABBITMQ_URL=amqp://rabbitmq
    - CART_PORT=3003
    - SECRET_KEY=t5FtCovFRPWCKx3qG8fLpSHQ
    - FRONTEND_URL=http://13.63.239.214:3000
    depends_on:
      rabbitmq:
        condition: service_healthy
  
  socket-service:
    build: ./services/socket-service
    restart: always
    ports:
      - "3005:3005"
    environment:
    - RABBITMQ_URL=amqp://rabbitmq
    - SOCKET_PORT=3005
    depends_on:
     rabbitmq:
      condition: service_healthy

  frontend:
    build: ./apps/frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
      - socket-service

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

    # environment:
    # - AUTH_SERVICE_URL=http://13.63.239.214:3001
    # - CART_SERVICE_URL=http://13.63.239.214:3003
    # - PRODUCT_SERVICE_URL=http://13.63.239.214:3002
    # - ORDER_SERVICE_URL=http://13.63.239.214:3004
    # - SOCKET_SERVICE_URL=http://13.63.239.214:3005